<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Celbridge — mockup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ===== Title bar ===== -->
      <header class="titlebar">
        <div class="titlebar-left">
          <button class="icon-btn" title="Menu" aria-label="Menu">
            <svg viewBox="0 0 16 16" width="16" height="16"><path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
          </button>
          <button class="icon-btn" title="Search" aria-label="Search">
            <svg viewBox="0 0 16 16" width="16" height="16"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
          <div class="project-chip">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M1.5 3.5a1 1 0 0 1 1-1h3.3l1.2 1.5h6.5a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H2.5a1 1 0 0 1-1-1z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            <span>cb-examples2</span>
          </div>
          <button class="icon-btn run" title="Run" aria-label="Run">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M4 3l9 5-9 5z" fill="currentColor"/></svg>
          </button>
        </div>

        <div class="titlebar-right">
          <button class="icon-btn" title="Layout"><svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="2" width="5" height="12" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="9" y="2" width="5" height="5" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="9" y="9" width="5" height="5" stroke="currentColor" fill="none" stroke-width="1.2"/></svg></button>
          <button class="icon-btn" title="Explorer"><svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="2" width="4" height="12" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="6" y="2" width="8" height="12" stroke="currentColor" fill="none" stroke-width="1.2"/></svg></button>
          <button class="icon-btn" title="Inspector"><svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="2" width="8" height="12" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="10" y="2" width="4" height="12" stroke="currentColor" fill="none" stroke-width="1.2"/></svg></button>
          <button class="icon-btn" title="Console"><svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="2" width="12" height="8" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="2" y="10" width="12" height="4" stroke="currentColor" fill="none" stroke-width="1.2"/></svg></button>
          <button class="icon-btn" title="Settings"><svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M3 13l1.5-1.5M11.5 4.5L13 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></button>
          <button class="icon-btn close" title="Close"><svg viewBox="0 0 16 16" width="12" height="12"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.4"/></svg></button>
        </div>
      </header>

      <!-- ===== Main grid: explorer | center | inspector ===== -->
      <main class="workspace">
        <!-- Explorer (hydrated from /data/explorer/explorer.json) -->
        <aside class="panel explorer">
          <div class="panel-header">
            <span class="panel-title" data-panel-title="explorer">Explorer</span>
            <button class="icon-btn small" title="Close"><svg viewBox="0 0 16 16" width="10" height="10"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.4"/></svg></button>
          </div>
          <div id="explorer-body"></div>
        </aside>

        <div class="resizer resizer-col" data-axis="x" data-var="--explorer-w" data-direction="1" data-min="140" data-max="600" role="separator" aria-orientation="vertical" aria-label="Resize Explorer"></div>

        <!-- Center column: editor + console -->
        <section class="center">
          <div class="editor-area">
            <!-- Tabs hydrated from /data/document_editor/document_editor.json -->
            <div class="tabs" id="editor-tabs"></div>

            <div class="editor">
              <pre class="code"><code id="code-block"></code></pre>
            </div>
          </div>

          <div class="resizer resizer-row" data-axis="y" data-var="--console-h" data-direction="-1" data-min="60" data-max="600" role="separator" aria-orientation="horizontal" aria-label="Resize Console"></div>

          <!-- Console hydrated from /data/console/console.json -->
          <div class="console">
            <div class="panel-header">
              <span class="panel-title" data-panel-title="console">Console</span>
              <div class="header-actions">
                <button class="icon-btn small" title="Collapse">▲</button>
                <button class="icon-btn small" title="Close"><svg viewBox="0 0 16 16" width="10" height="10"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.4"/></svg></button>
              </div>
            </div>
            <div class="console-body" id="console-body"></div>
          </div>
        </section>

        <div class="resizer resizer-col" data-axis="x" data-var="--inspector-w" data-direction="-1" data-min="140" data-max="600" role="separator" aria-orientation="vertical" aria-label="Resize Inspector"></div>

        <!-- Inspector hydrated from /data/inspector/inspector.json -->
        <aside class="panel inspector">
          <div class="panel-header">
            <span class="panel-title" data-panel-title="inspector">Inspector</span>
            <button class="icon-btn small" title="Close"><svg viewBox="0 0 16 16" width="10" height="10"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.4"/></svg></button>
          </div>
          <div class="inspector-body" id="inspector-body"></div>
        </aside>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
